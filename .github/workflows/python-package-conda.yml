name: Tests
on: [push, pull_request]

jobs:
  build-linux:
    name: Tests
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5

    steps:
      - uses: actions/checkout@v4
        with:
          path: httpx-pycurl

      - name: Checkout httpx
        uses: actions/checkout@v4
        with:
          repository: encode/httpx
          path: httpx

      - name: Set up Python 3.10
        uses: actions/setup-python@v3
        with:
          python-version: "3.10"

      - name: Add conda to system path
        run: |
          # $CONDA is an environment variable pointing to the root of the miniconda directory
          echo $CONDA/bin >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          conda install conda-pypi editables pytest nginx pytest-asyncio pytest-xprocess trustme httpx pycurl h2 chardet zstandard brotli trio uvicorn cryptography
          conda pypi install --ignore-channels socksio
          conda pypi install -e httpx-pycurl/

      - name: Apply httpx patch
        run: |
          cd httpx
          git apply ../httpx-pycurl/tests/httpx-tests.patch

      - name: Run httpx-pycurl tests
        run: |
          cd httpx-pycurl
          pytest

      - name: Run httpx async tests with httpx-pycurl transport
        run: |
          cd httpx
          pytest tests/client/test_async_client.py -k asyncio -v
